{% extends "base.html" %}
{% block title %}Verify 2FA - ShowWise{% endblock %}
{% block content %}
<div style="max-width: 500px; margin: 3rem auto;">
  <div class="card">
    <div style="text-align: center; margin-bottom: 2rem;">
      <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
        <i class="fas fa-shield-alt"></i>
      </div>
      <h1>Two-Factor Authentication</h1>
      <p style="color: var(--gray-600);">Enter the 6-digit code from your authenticator app</p>
    </div>

    <form method="POST" action="{{ url_for('verify_2fa') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      
      <div class="form-group" style="margin-bottom: 1.5rem;">
        <label for="token"><i class="fas fa-key"></i> Authentication Code</label>
        <input 
          type="text" 
          id="token" 
          name="token" 
          placeholder="000000" 
          maxlength="6"
          pattern="[0-9]{6}"
          inputmode="numeric"
          required
          autofocus
          style="font-size: 1.5rem; letter-spacing: 0.5rem; text-align: center;"
        >
        <small style="color: var(--gray-600);">Enter 6 digits without spaces</small>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%;">
        <i class="fas fa-check"></i> Verify
      </button>

      <div style="margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200);">
        <label style="display: flex; align-items: center; gap: 0.5rem; font-weight: 400; cursor: pointer;">
          <input type="checkbox" name="use_backup" style="width: auto;">
          Use backup code instead
        </label>
      </div>
    </form>

    <div style="margin-top: 2rem; padding-top: 2rem; border-top: 1px solid var(--gray-200); text-align: center;">
      <a href="{{ url_for('logout') }}" style="color: var(--gray-600); text-decoration: none;">
        <i class="fas fa-times"></i> Cancel Login
      </a>
    </div>
  </div>
</div>
{% endblock %}
