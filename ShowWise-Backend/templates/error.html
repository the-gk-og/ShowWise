{% extends "base.html" %}
{% block title %}Error - ShowWise{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 4rem auto;">
  <div class="card" style="text-align: center; padding: 3rem;">
    <div style="font-size: 4rem; color: var(--danger); margin-bottom: 1rem;">
      <i class="fas fa-exclamation-circle"></i>
    </div>
    <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 0.5rem;">{{ error_code }}</h1>
    <p style="font-size: 1.2rem; color: var(--gray-600); margin-bottom: 2rem;">{{ message }}</p>
    <a href="{{ url_for('login') }}" class="btn btn-primary">
      <i class="fas fa-home"></i> Back to Home
    </a>
  </div>
</div>
{% endblock %}
